name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /app",
              "git pull origin main",
              "aws ssm get-parameters-by-path --path /luxevenue --with-decryption --query \"Parameters[*].[Name,Value]\" --output text | awk \"{gsub(\\\"/luxevenue/\\\",\\\"\\\",\\$1); print \\$1\\\"=\\\"\\\"\\$2\\\"\\\"\"}\" > .env",
              "chmod 600 .env",
              "npm ci --omit=dev",
              "npm run build",
              "pm2 reload luxevenue --update-env"
            ]' \
            --comment "Deploy from GitHub Actions ${{ github.sha }}"
